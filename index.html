<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>angelwing — community</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loader" id="loader">
        <span class="loader-text">loading...</span>
    </div>

    <header class="header">
        <span>angelwing</span>
    </header>
    
    <main class="main-content">
        <div class="text-section">
            <h1 class="title">angelwing —<br>any words</h1>
            <p class="subtitle">community space</p>
            <div class="datetime-inline">
                <span class="datetime-separator">◦</span>
                <span class="time" id="time">00:00:00</span>
                <span class="datetime-separator">◦</span>
                <span class="date" id="date">01.01.2024</span>
            </div>
        </div>
        
        <div class="gif-section">
            <div class="gif-wrapper">
                <img src="wing.gif" alt="Animation" class="gif-image">
                <div class="corner-dot corner-dot--tl"></div>
                <div class="corner-dot corner-dot--tr"></div>
                <div class="corner-dot corner-dot--bl"></div>
                <div class="corner-dot corner-dot--br"></div>
            </div>
        </div>
    </main>
    
    <footer class="footer">
        <div class="social-links">
            <a href="https://vk.com/#" target="_blank" rel="noopener noreferrer" class="social-link" title="VK">
                <img src="vk.svg" alt="VK" class="social-icon">
            </a>
            <a href="https://t.me/#" target="_blank" rel="noopener noreferrer" class="social-link" title="Telegram">
                <img src="telegram.svg" alt="Telegram" class="social-icon">
            </a>
            <a href="https://steamcommunity.com/groups/whiteangelwings" target="_blank" rel="noopener noreferrer" class="social-link" title="Steam">
                <img src="steam.svg" alt="Steam" class="social-icon">
            </a>
            <a href="https://discord.gg/S8kZS9Gm" target="_blank" rel="noopener noreferrer" class="social-link" title="Discord">
                <img src="discord.svg" alt="Discord" class="social-icon">
            </a>
        </div>
        <p class="author">by dariaMarkess</p>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
